<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearifyOS - Сборки Windows</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header>
        <a href="/" class="logo">ClearifyOS</a>
        <nav>
            <a href="/" class="active">Главная</a>
            <a href="/builds">Сборки</a>
        </nav>
    </header>

    <main>
        <div class="build-header">
            <h1 style="font-size: 36px; margin-bottom: 16px;">Быстрая и чистая система</h1>
            <p style="color: var(--md-sys-color-on-surface-variant);">Сборки Windows, сделанные с душой и вниманием к деталям через NTLite.</p>
        </div>

        <div class="slider-container">
            <div class="slider-wrapper">
                <div class="slide">
                    <img src="/slides/slide1.webp" alt="Скриншот 1">
                    <div class="slide-caption">ClearifyOS 11 25H2: Актуальность и чистота</div>
                </div>
                <div class="slide">
                    <img src="/slides/slide2.webp" alt="Скриншот 2">
                    <div class="slide-caption">ClearifyOS 10 22H2: Фанатам Windows 10</div>
                </div>
                <div class="slide">
                    <img src="/slides/slide3.webp" alt="Скриншот 3">
                    <div class="slide-caption">ClearifyOS 11 22H2 Lite: Максимальная оптимизация</div>
                </div>
            </div>
            <div class="slider-controls">
                <button class="slider-btn" id="prevSlide">&lt;</button>
                <button class="slider-btn" id="nextSlide">&gt;</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="/builds" class="btn btn-primary" style="font-size: 18px; padding: 14px 32px;">Смотреть все сборки</a>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
