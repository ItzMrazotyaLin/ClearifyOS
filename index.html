<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearifyOS - Чистые сборки Windows</title>
    <link rel="stylesheet" href="/ClearifyOS/style.css">
</head>
<body>

    <header>
        <a href="/ClearifyOS" class="logo">ClearifyOS</a>
        <nav>
            <a href="/ClearifyOS" class="active">Главная</a>
            <a href="/ClearifyOS/builds">Сборки</a>
        </nav>
    </header>

    <main>
        <div class="build-header">
            <h1 style="font-size: 36px; margin-bottom: 16px;">Быстрая и чистая система</h1>
            <p style="color: var(--md-sys-color-on-surface-variant);">Сборки Windows, сделанные с душой и вниманием к деталям через NTLite.</p>
        </div>

        <div class="slider-container">
            <div class="slider-wrapper">
                <div class="slide">
                    <img src="https://placehold.co/900x500/0061A4/FFFFFF?text=Screenshot+1" alt="Скриншот 1">
                    <div class="slide-caption">ClearifyOS 10 Lite: Идеально для старых ПК</div>
                </div>
                <div class="slide">
                    <img src="https://placehold.co/900x500/004070/FFFFFF?text=Screenshot+2" alt="Скриншот 2">
                    <div class="slide-caption">ClearifyOS 11 Pro: Максимальная производительность</div>
                </div>
                <div class="slide">
                    <img src="https://placehold.co/900x500/002040/FFFFFF?text=Screenshot+3" alt="Скриншот 3">
                    <div class="slide-caption">Никакого мусора и телеметрии, только суть</div>
                </div>
            </div>
            <div class="slider-controls">
                <button class="slider-btn" id="prevSlide">&lt;</button>
                <button class="slider-btn" id="nextSlide">&gt;</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="/ClearifyOS/builds" class="btn btn-primary" style="font-size: 18px; padding: 14px 32px;">Смотреть все сборки</a>
        </div>
    </main>

    <script src="/ClearifyOS/script.js"></script>
</body>
</html>
